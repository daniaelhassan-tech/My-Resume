<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>Dania El Hassan — Résumé Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--accent:#635BFF;--ink:#1c2128;--soft:#5e6670;--line:#e6e9ee;--rail:#635BFF;--railtx:#f2f0ff;
  --font:'Manrope',Roboto,"Helvetica Neue",Arial,sans-serif;--s:1;}
*{margin:0;padding:0;box-sizing:border-box}html{-webkit-print-color-adjust:exact;print-color-adjust:exact;background:#5b616b}
body{font-family:var(--font);color:var(--ink)}
#panel{position:sticky;top:0;z-index:20;background:#11151b;color:#e6e9ee;padding:10px 16px;display:flex;flex-wrap:wrap;gap:13px;align-items:center;font:13px/1.2 -apple-system,Segoe UI,Roboto,Arial,sans-serif;box-shadow:0 2px 14px rgba(0,0,0,.3)}
#panel label{display:flex;flex-direction:column;gap:3px;color:#9aa3ad;font-size:10px;text-transform:uppercase;letter-spacing:.07em}
#panel select,#panel input[type=text]{background:#1e242c;color:#fff;border:1px solid #333b45;border-radius:6px;padding:5px 7px;font-size:12.5px}
#panel input[type=color]{width:36px;height:30px;border:1px solid #333b45;border-radius:6px;background:#1e242c;padding:2px}
#panel .title{font-weight:700;color:#fff;font-size:13px;text-transform:none;letter-spacing:0}
.sw-row{display:flex;gap:5px}.sw{width:20px;height:20px;border-radius:5px;border:1px solid #333b45;cursor:pointer;padding:0}
#print,#edit,#save{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:12.5px}
.stage{padding:22px 0 60px;display:flex;justify-content:center}
.sheet{width:8.5in;min-height:11in;background:#fff;box-shadow:0 4px 30px rgba(0,0,0,.25);font-size:calc(9.6pt * var(--s));line-height:1.36}
/* sidebar */
.sb{display:flex;min-height:11in}
.rail{width:2.32in;background:var(--accent);color:#fff;padding:0.46in 0.3in}
.main{flex:1;padding:0.4in 0.46in 0.32in}
.ic{display:inline-block;width:1em;height:1em;vertical-align:-.12em;margin-right:.5em;flex:none}
.rname{font-size:2.35em;font-weight:800;color:#fff;line-height:1.04;letter-spacing:-.4px}
.rtag{font-size:.92em;color:rgba(255,255,255,.85);margin-top:.7em;font-weight:600;line-height:1.4}
.rh{font-size:.8em;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.66);font-weight:800;margin:1.5em 0 .55em}
.rail .cp{font-size:.88em;color:var(--railtx);margin-bottom:.34em}
.rail a{display:flex;align-items:center;font-size:.88em;color:#fff;text-decoration:none;margin-bottom:.34em;line-height:1.3}
.exul,.rul{list-style:none}
.exul li{position:relative;padding-left:.95em;font-size:.9em;line-height:1.4;color:var(--railtx);margin-bottom:.28em}
.exul li::before{content:"";position:absolute;left:0;top:.52em;width:.32em;height:.32em;border-radius:50%;background:rgba(255,255,255,.8)}
.rul li{font-size:.9em;line-height:1.38;color:var(--railtx);margin-bottom:.32em;display:flex;gap:.5em}
/* main */
h2{font-size:.86em;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:800;margin:.85em 0 .42em;padding-bottom:.3em;border-bottom:1px solid var(--line)}
h2:first-child{margin-top:0}
.hdr{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;margin-bottom:.3em}
.hname{font-size:2.7em;font-weight:800;letter-spacing:-.5px;line-height:1}
.htag{color:var(--accent);font-size:1.05em;font-weight:600;margin-top:.5em}
.hcontact{text-align:right;font-size:.87em;color:var(--soft);line-height:1.7}
.hcontact a{color:var(--accent);text-decoration:none;font-weight:600}
.hcon{display:flex;flex-wrap:wrap;gap:.35em 1.1em;align-items:center;font-size:.85em;color:var(--soft);margin:.6em 0 .3em}.hcon a{display:inline-flex;align-items:center;color:var(--accent);text-decoration:none}
.summary{font-size:.93em;line-height:1.4;color:#2c3038}
.jh{display:flex;justify-content:space-between;align-items:baseline;margin-top:.6em;gap:10px}
.jt{font-size:1.09em;font-weight:700}.jt .c{color:var(--accent)}
.jm{font-size:.86em;color:var(--soft);font-style:italic;white-space:nowrap}
.jsub{font-size:.95em;font-weight:600;color:#2b3038;margin:0 0 .1em}
.scope{color:#34393f;font-size:.9em;margin:.1em 0 .25em}
.mul{list-style:none}.mul li{position:relative;padding-left:1.1em;margin:0 0 .14em;font-size:.9em;line-height:1.3}
.mul li::before{content:"";position:absolute;left:0;top:.52em;width:.4em;height:.4em;background:var(--accent);border-radius:50%}
.b{font-weight:700}.addl{font-size:.88em;color:var(--soft);margin-top:.3em}
@media print{html{background:#fff}#panel{display:none}.stage{padding:0}.sheet{box-shadow:none;min-height:11in}@page{size:letter;margin:0}}
</style></head><body data-layout="sidebar">
<div id="panel">
  <span class="title">Résumé Builder</span>
  <label>Company / Preset<select id="preset"><option>Generic</option><option>Figma</option><option>Google</option><option>Microsoft</option><option>Anthropic</option><option selected>Stripe</option><option>Notion</option><option>Custom</option></select></label>
  <label>Accent<input type="color" id="accent" value="#635BFF"></label>
  <label>Quick accents<div class="sw-row">
    <button class="sw" data-c="#635BFF" style="background:#635BFF" title="Stripe"></button>
    <button class="sw" data-c="#0F6E63" style="background:#0F6E63" title="Pine"></button>
    <button class="sw" data-c="#3F3DBA" style="background:#3F3DBA" title="Indigo"></button>
    <button class="sw" data-c="#7B2D3B" style="background:#7B2D3B" title="Oxblood"></button>
    <button class="sw" data-c="#2B2F36" style="background:#2B2F36" title="Charcoal"></button>
  </div></label>
  <label>Layout<select id="layout"><option value="sidebar" selected>Sidebar</option><option value="stack">Single column</option></select></label>
  <label>Font<select id="font">
    <option value="'Manrope',Arial,sans-serif">Manrope</option>
    <option value="'Inter','Helvetica Neue',Arial,sans-serif">Inter</option>
    <option value="'Helvetica Neue',Arial,sans-serif">Helvetica</option>
    <option value="'Roboto',Arial,sans-serif">Roboto</option>
    <option value="Georgia,serif">Georgia</option>
  </select></label>
  <label>Text size<select id="scale"><option value="0.9">Small</option><option value="0.95">Medium</option><option value="1" selected>Default</option><option value="1.06">Large</option><option value="1.12">X-Large</option></select></label>
  <button id="edit">✎ Edit text</button><button id="save">⬇ Save HTML</button><button id="print">⌘P · PDF</button>
</div>
<div class="stage"><div class="sheet" id="sheet"></div></div>
<script>
const ICONS={
 linkedin:'<svg class="ic" viewBox="0 0 24 24" fill="currentColor"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.35V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 110-4.13 2.06 2.06 0 010 4.13zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z"/></svg>',
 globe:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a15 15 0 010 18 15 15 0 010-18z"/></svg>',
 github:'<svg class="ic" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.91 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222 0 1.606-.014 2.898-.014 3.293 0 .322.216.694.825.576C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>',
 substack:'<svg class="ic" viewBox="0 0 24 24" fill="currentColor"><path d="M22.539 8.242H1.46V5.406h21.08v2.836zM1.46 10.812V24L12 18.11 22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.08V0z"/></svg>'
};
const DATA={
 name:"Dania El Hassan",tagline:"Product Leadership · Go-to-Market Strategy · Ecosystem Partnerships",
 location:"New York, NY",email:"dania.elhassan@gmail.com",
 links:[["linkedin","https://www.linkedin.com/in/daniaelhassan","in/daniaelhassan"],["globe","https://daniaelhassan.com","daniaelhassan.com"],["github","https://github.com/daniaelhassan-tech","daniaelhassan-tech"],["substack","https://substack.com/@daniaelhassan1","@daniaelhassan1"]],
 expertise:["AI product strategy","Product-led growth","GTM partnerships &amp; BD","Enterprise SaaS","Team building &amp; transformation"],
 beyond:[["💻","AI coding projects"],["🚀","Product &amp; startup consulting"],["🏄","Wingfoiling"],["🎨","Arts"]],
 languages:"French<br>Arabic<br>Spanish",
 summary:"I&#8217;m a product leader with 15+ years building software that professional engineers trust to do their most demanding work. As Global Head of Product for AutoCAD, I evolved a legacy desktop application into a cloud-native AI platform, doubling MAU to 2M+ and driving $2B+ in revenue. I do my best work at the center of complex transformations, aligning teams and partners around a shared vision. Now I&#8217;m focused on building AI-native products.",
 experience:[
  {co:"Autodesk",title:"Global Head of Product Management, AutoCAD",date:"2015&#8211;2025",
   scope:"Owned product, strategy, and growth for the AutoCAD line: 8 toolsets, web, mobile, and developer ecosystem. Doubled the business to $2B+ over six years.",
   bullets:[["AI strategy","defined the AI roadmap and shipped an MCP server plus 8+ automations to 1M+ engineers, designed to be safe and reversible in accuracy-critical work."],["Launched AutoCAD Web","brought high-precision CAD to the browser for the first time, scaling it to 80K+ MAU through product-led onboarding."],["GTM partnerships","negotiated co-integration deals with Google, Microsoft, Dropbox, and Box, giving customers access to 10B+ files stored outside Autodesk."],["Common Data Platform","packaged a shared collaboration offering across 6 Autodesk products and shipped it to ~3M enterprise users in March 2026, aligning product, sales, and executive stakeholders."],["SaaS transformation","led AutoCAD&#8217;s perpetual-to-subscription shift, re-architecting the company-wide entitlement system and co-defining the cloud-value standards presented to the SEC, which secured the transition and avoided a 4% revenue penalty."],["Leadership","grew the product org from 3 to 12 PMs and 3 senior managers across a 170-engineer organization, stood up Product Ops, and owned the executive keynote at Autodesk University."]]},
  {co:"Fieldwire Labs",title:"Director of Customer Success",date:"2014",bullets:[[null,"Built the customer-success function from scratch and shaped the early go-to-market motion, landing 7 enterprise customers."]]},
  {co:"Onshape",title:"Strategy &amp; Marketing Manager",date:"2013",bullets:[[null,"Built TAM/SAM models, segmentation, and pricing strategy for cloud CAD."]]},
  {co:"Turner Construction",title:"Virtual Technologies &amp; Field Engineering",date:"2008&#8211;2012",bullets:[[null,"Led 3D coordination and field teams on $300M+ projects (~$2M saved); launched a lidar AR/VR service for building owners."]]}
 ],
 education:[{co:"MIT Sloan School of Management",title:"MBA, Entrepreneurship &amp; Innovation",date:"2012&#8211;2014"},{co:"Tufts University",title:"BS, Civil Engineering",date:"2004&#8211;2008"}],
 eduExtra:"<b>Additional:</b> UC Berkeley Product Management Certificate (2017) · Andrew Ng Machine Learning (Coursera)",
 speaking:[["Autodesk University Annual Keynote (2018&#8211;2024)","owned the executive product narrative for 4,000+ viewers."],["Google I/O 2018","authored the AutoCAD Web narrative presented on the mainstage."],["Wharton Future of Cities","panelist on digital twins, spatial computing, and the future of cities."],[null,"Featured in Architosh, Engineering.com, and ITmedia (Japan) on AI and customer-centric product strategy."]]
};
const PRESETS={Generic:"#26415e",Figma:"#A259FF",Google:"#1a73e8",Microsoft:"#0067b8",Anthropic:"#cc785c",Stripe:"#635BFF",Notion:"#2f3437"};
const $=id=>document.getElementById(id);
function linksHTML(){return DATA.links.map(l=>'<a href="'+l[1]+'">'+ICONS[l[0]]+l[2]+'</a>').join('');}
function expHTML(list){return list.map(j=>{
  let h='<div class="jh"><div class="jt"><span class="c">'+j.co+'</span></div><div class="jm">'+j.date+'</div></div><div class="jsub">'+j.title+'</div>';
  if(j.scope)h+='<div class="scope">'+j.scope+'</div>';
  if(j.bullets)h+='<ul class="mul">'+j.bullets.map(b=>'<li>'+(b[0]?'<span class="b">'+b[0]+':</span> ':'')+b[1]+'</li>').join('')+'</ul>';
  return h;}).join('');}
function speakHTML(){return '<ul class="mul">'+DATA.speaking.map(s=>'<li>'+(s[0]?'<span class="b">'+s[0]+':</span> ':'')+s[1]+'</li>').join('')+'</ul>';}
function eduHTML(){return expHTML(DATA.education)+'<p class="addl">'+DATA.eduExtra+'</p>';}
function render(){
 const layout=$('layout').value; document.body.dataset.layout=layout;
 const main='<h2>Summary</h2><p class="summary">'+DATA.summary+'</p>'+
   '<h2>Experience</h2>'+expHTML(DATA.experience)+
   '<h2>Education</h2>'+eduHTML()+
   '<h2>Speaking &amp; Thought Leadership</h2>'+speakHTML();
 if(layout==='sidebar'){
  $('sheet').innerHTML='<div class="sb"><aside class="rail">'+
    '<div class="rname">'+DATA.name.replace(' ','<br>')+'</div>'+
    '<div class="rh">Contact</div><div class="cp">'+DATA.location+'</div><div class="cp">'+DATA.email+'</div>'+linksHTML()+
    '<div class="rh">Expertise</div><ul class="exul">'+DATA.expertise.map(e=>'<li>'+e+'</li>').join('')+'</ul>'+
    '<div class="rh">Beyond Work</div><ul class="exul">'+DATA.beyond.map(b=>'<li>'+b[1]+'</li>').join('')+'</ul>'+
    '<div class="rh">Languages</div><div class="cp">'+DATA.languages+'</div>'+
    '</aside><main class="main">'+main+'</main></div>';
 } else {
  // single column: strip Beyond Work to save space
  $('sheet').innerHTML='<div style="padding:0.5in 0.62in 0.4in">'+
    '<div class="hname">'+DATA.name+'</div>'+
    '<div class="hcon">'+DATA.location+' · '+DATA.email+'</div><div class="hcon" style="margin-top:.1em">'+DATA.links.map(l=>'<a href="'+l[1]+'">'+ICONS[l[0]]+l[2]+'</a>').join('')+'</div>'+
    main+'</div>';
 }
}
function setAccent(c){document.documentElement.style.setProperty('--accent',c);}
$('preset').addEventListener('change',e=>{if(PRESETS[e.target.value]){setAccent(PRESETS[e.target.value]);$('accent').value=PRESETS[e.target.value];}});
$('accent').addEventListener('input',e=>{$('preset').value='Custom';setAccent(e.target.value);});
document.querySelectorAll('.sw').forEach(b=>b.addEventListener('click',()=>{$('preset').value='Custom';$('accent').value=b.dataset.c;setAccent(b.dataset.c);}));
$('layout').addEventListener('change',render);
$('font').addEventListener('change',e=>document.documentElement.style.setProperty('--font',e.target.value));
$('scale').addEventListener('change',e=>document.documentElement.style.setProperty('--s',e.target.value));
$('print').addEventListener('click',()=>window.print());
let editing=false;
$('edit').addEventListener('click',()=>{editing=!editing;$('sheet').contentEditable=editing;$('sheet').style.outline=editing?'2px dashed var(--accent)':'';$('edit').textContent=editing?'✓ Done':'✎ Edit text';});
function download(){var css=document.querySelector('style').innerHTML;var rs=getComputedStyle(document.documentElement);var acc=rs.getPropertyValue('--accent').trim();var font=rs.getPropertyValue('--font').trim();var s=rs.getPropertyValue('--s').trim();var sheet=document.getElementById('sheet').outerHTML;var doc='<!DOCTYPE html><html><head><meta charset="utf-8"><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>'+css+'</style><style>html{background:#fff!important}.stage{padding:0}#panel{display:none}:root{--accent:'+acc+';--font:'+font+';--s:'+s+'}</style></head><body><div class="stage">'+sheet+'</div></body></html>';var b=new Blob([doc],{type:'text/html'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='resume.html';a.click();}
$('save').addEventListener('click',download);
setAccent('#635BFF'); render();
</script></body></html>
